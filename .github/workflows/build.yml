name: Build Providers

on:
  push:
    branches:
      - main
    paths:
      - "providers/**"
      - "package.json"
      - "package-lock.json"
      - "build-bundled.js"
      - "manifest.json"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Needed so the workflow can push build output back to the same branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Providers
        run: npm run build

      - name: Ensure modflix.json is present in dist
        run: |
          if [ -f providers/modflix.json ]; then
            cp providers/modflix.json dist/modflix.json
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          if-no-files-found: error

      - name: Commit and push dist changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist

          if git diff --cached --quiet; then
            echo "No dist changes to commit"
            exit 0
          fi

          git commit -m "chore: auto build dist [skip ci]"
          git push origin HEAD:main
